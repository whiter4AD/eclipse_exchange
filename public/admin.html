<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Eclipse — Админ</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0a; --bg2:#111111; --bg3:#181818; --bg4:#202020;
    --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
    --gold:#D4A843; --gold-dim:rgba(212,168,67,0.12); --gold-dim2:rgba(212,168,67,0.22);
    --text:#F0EDE8; --text2:#9A9590; --text3:#5A5650;
    --green:#3DD68C; --green-dim:rgba(61,214,140,0.12);
    --red:#FF5555; --red-dim:rgba(255,85,85,0.12);
    --blue:#4A9EFF; --blue-dim:rgba(74,158,255,0.12);
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body { background:var(--bg); color:var(--text); font-family:'Space Grotesk',sans-serif;
    min-height:100vh; -webkit-font-smoothing:antialiased; }
  body::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background:radial-gradient(ellipse 80% 40% at 50% -5%, rgba(212,168,67,0.07) 0%, transparent 60%);
  }
  .app { position:relative; z-index:1; max-width:430px; margin:0 auto; padding-bottom:30px; }

  .header { display:flex; align-items:center; gap:12px; padding:18px 20px 14px;
    border-bottom:0.5px solid var(--border); }
  .header-icon { width:32px; height:32px; border-radius:8px; background:var(--red-dim);
    border:0.5px solid rgba(255,85,85,0.4); display:flex; align-items:center; justify-content:center; }
  .header-icon svg { width:16px; height:16px; color:var(--red); }
  .header-title { font-size:15px; font-weight:700; }
  .header-sub { font-size:11px; color:var(--text3); margin-top:2px; }

  .tabs { display:flex; gap:2px; padding:14px 20px 0; }
  .tab { flex:1; padding:9px 6px; border-radius:10px; background:var(--bg2);
    border:0.5px solid var(--border); font-size:11px; font-weight:600;
    color:var(--text3); cursor:pointer; text-align:center; transition:all 0.15s; }
  .tab.active { background:var(--gold-dim2); border-color:rgba(212,168,67,0.4); color:var(--gold); }

  .section { display:none; padding-top:4px; }
  .section.active { display:block; }

  .section-header { padding:18px 20px 10px; font-size:11px; font-weight:600;
    letter-spacing:0.1em; text-transform:uppercase; color:var(--text3); }

  /* Stats grid */
  .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:0 20px; }
  .stat-card { background:var(--bg2); border:0.5px solid var(--border2); border-radius:14px; padding:16px; }
  .stat-icon { width:32px; height:32px; border-radius:8px; display:flex; align-items:center;
    justify-content:center; margin-bottom:10px; }
  .stat-icon svg { width:16px; height:16px; }
  .stat-val { font-family:'JetBrains Mono',monospace; font-size:22px; font-weight:600; line-height:1; }
  .stat-label { font-size:11px; color:var(--text3); margin-top:4px; font-weight:500; }
  .stat-full { grid-column:1/-1; }

  /* Users list */
  .user-item { display:flex; align-items:center; gap:12px; padding:14px 16px;
    background:var(--bg2); border:0.5px solid var(--border); border-radius:12px;
    margin:0 20px 8px; }
  .user-rank { font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:600;
    color:var(--text3); width:20px; text-align:center; flex-shrink:0; }
  .user-rank.gold { color:var(--gold); }
  .user-avatar { width:36px; height:36px; border-radius:50%; background:var(--gold-dim2);
    border:0.5px solid rgba(212,168,67,0.3); display:flex; align-items:center;
    justify-content:center; font-size:14px; font-weight:700; color:var(--gold); flex-shrink:0; }
  .user-info { flex:1; min-width:0; }
  .user-name { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .user-tag { font-size:11px; color:var(--text3); margin-top:2px; }
  .user-stats { text-align:right; flex-shrink:0; }
  .user-orders { font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:600; color:var(--gold); }
  .user-vol { font-size:11px; color:var(--text3); margin-top:2px; }
  .block-btn { padding:5px 10px; border-radius:7px; font-size:11px; font-weight:600;
    border:0.5px solid; cursor:pointer; font-family:'Space Grotesk',sans-serif;
    transition:opacity 0.15s; margin-top:6px; }
  .block-btn.block { background:var(--red-dim); border-color:rgba(255,85,85,0.4); color:var(--red); }
  .block-btn.unblock { background:var(--green-dim); border-color:rgba(61,214,140,0.4); color:var(--green); }

  /* Broadcast */
  .broadcast-card { margin:0 20px; background:var(--bg2); border:0.5px solid var(--border2);
    border-radius:14px; padding:18px; }
  .broadcast-card textarea {
    width:100%; background:var(--bg3); border:0.5px solid var(--border2); border-radius:10px;
    padding:13px 14px; font-family:'Space Grotesk',sans-serif; font-size:14px;
    color:var(--text); resize:none; outline:none; height:120px; transition:border-color 0.2s;
  }
  .broadcast-card textarea:focus { border-color:var(--gold); }
  .broadcast-card textarea::placeholder { color:var(--text3); }
  .char-count { font-size:11px; color:var(--text3); text-align:right; margin-top:6px; }
  .broadcast-preview { margin-top:12px; padding:12px; background:var(--bg3);
    border:0.5px solid var(--border); border-radius:8px; font-size:13px;
    color:var(--text2); line-height:1.5; min-height:40px; white-space:pre-wrap; word-break:break-word; }
  .broadcast-preview.empty { color:var(--text3); font-style:italic; }
  .send-btn { width:100%; padding:14px; background:var(--gold); color:#0a0a0a;
    border:none; border-radius:10px; font-family:'Space Grotesk',sans-serif;
    font-size:14px; font-weight:700; cursor:pointer; margin-top:14px;
    display:flex; align-items:center; justify-content:center; gap:8px;
    transition:opacity 0.15s; }
  .send-btn:disabled { opacity:0.4; cursor:not-allowed; }
  .broadcast-result { margin-top:12px; padding:12px; border-radius:8px;
    font-size:13px; font-weight:500; text-align:center; display:none; }
  .broadcast-result.success { background:var(--green-dim); color:var(--green); border:0.5px solid rgba(61,214,140,0.3); }
  .broadcast-result.error { background:var(--red-dim); color:var(--red); border:0.5px solid rgba(255,85,85,0.3); }
  .md-hints { margin-top:12px; display:flex; flex-wrap:wrap; gap:6px; }
  .md-hint { padding:4px 10px; background:var(--bg4); border:0.5px solid var(--border);
    border-radius:6px; font-size:11px; color:var(--text3); cursor:pointer; font-family:'JetBrains Mono',monospace; }
  .md-hint:active { opacity:0.7; }

  /* Loading */
  .loading { text-align:center; padding:40px 20px; color:var(--text3); font-size:14px; }
  .spinner { width:24px; height:24px; border:2px solid var(--border2);
    border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite;
    margin:0 auto 12px; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* Toast */
  .toast { position:fixed; top:20px; left:50%; transform:translateX(-50%) translateY(-80px);
    background:var(--bg3); border:0.5px solid var(--border2); border-radius:10px;
    padding:12px 18px; font-size:13px; font-weight:500; color:var(--text);
    z-index:300; transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    white-space:nowrap; }
  .toast.show { transform:translateX(-50%) translateY(0); }
  .toast.success { border-color:rgba(61,214,140,0.4); color:var(--green); }
  .toast.error { border-color:rgba(255,85,85,0.4); color:var(--red); }

  .empty-state { text-align:center; padding:40px 20px; color:var(--text3); }
  .empty-state svg { width:40px; height:40px; margin-bottom:12px; opacity:0.3; }
  .balance-chip { display:inline-block; padding:3px 9px; border-radius:6px;
    background:var(--gold-dim); border:0.5px solid rgba(212,168,67,0.3);
    font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--gold); }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
        <path d="M8 1l2 5h5l-4 3 1.5 5L8 11l-4.5 3L5 9 1 6h5z"/>
      </svg>
    </div>
    <div>
      <div class="header-title">Админ-панель</div>
      <div class="header-sub">Eclipse Exchange</div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('stats')">📊 Стата</div>
    <div class="tab" onclick="switchTab('users')">👥 Юзеры</div>
    <div class="tab" onclick="switchTab('broadcast')">📢 Рассылка</div>
  </div>

  <!-- STATS -->
  <div class="section active" id="section-stats">
    <div class="section-header">Общая статистика</div>
    <div id="stats-content" class="loading">
      <div class="spinner"></div>Загрузка...
    </div>
  </div>

  <!-- USERS -->
  <div class="section" id="section-users">
    <div class="section-header">Топ-10 по обменам</div>
    <div id="users-content" class="loading">
      <div class="spinner"></div>Загрузка...
    </div>
  </div>

  <!-- BROADCAST -->
  <div class="section" id="section-broadcast">
    <div class="section-header">Рассылка пользователям</div>
    <div class="broadcast-card">
      <textarea id="broadcast-text" placeholder="Введите сообщение для рассылки...&#10;&#10;Поддерживается Markdown: *жирный*, _курсив_" oninput="updatePreview()"></textarea>
      <div class="char-count"><span id="char-count">0</span> символов</div>

      <div class="md-hints">
        <div class="md-hint" onclick="insertMd('*', '*')">*жирный*</div>
        <div class="md-hint" onclick="insertMd('_', '_')">_курсив_</div>
        <div class="md-hint" onclick="insertMd('\`', '\`')">`код`</div>
        <div class="md-hint" onclick="insertMd('\n• ', '')">• список</div>
      </div>

      <div class="section-header" style="padding:14px 0 8px;font-size:10px">Предпросмотр</div>
      <div class="broadcast-preview empty" id="broadcast-preview">Начните вводить сообщение...</div>

      <button class="send-btn" id="send-btn" onclick="sendBroadcast()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2L2 7l5 2m7-7L9 14l-2-5m7-7L7 9"/>
        </svg>
        Отправить всем
      </button>
      <div class="broadcast-result" id="broadcast-result"></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"><span id="toast-msg"></span></div>

<script>
  const tg = window.Telegram?.WebApp;
  let initData = '';
  if (tg) { tg.expand(); tg.setHeaderColor('#0a0a0a'); tg.setBackgroundColor('#0a0a0a'); initData = tg.initData || ''; }

  async function api(method, path, body) {
    const opts = { method, headers: { 'Content-Type':'application/json', 'X-Telegram-Init-Data':initData } };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(path, opts);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Ошибка сервера');
    return data;
  }

  // ── Tabs ────────────────────────────────────────────────────────────────────
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    const tabs = ['stats','users','broadcast'];
    document.querySelectorAll('.tab')[tabs.indexOf(tab)].classList.add('active');
    document.getElementById('section-' + tab).classList.add('active');
    if (tab === 'stats') loadStats();
    if (tab === 'users') loadUsers();
  }

  // ── Stats ───────────────────────────────────────────────────────────────────
  async function loadStats() {
    const el = document.getElementById('stats-content');
    el.innerHTML = '<div class="loading"><div class="spinner"></div>Загрузка...</div>';
    try {
      const s = await api('GET', '/api/admin/stats');
      el.innerHTML = `
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon" style="background:var(--gold-dim)">
              <svg viewBox="0 0 16 16" fill="none" stroke="var(--gold)" stroke-width="1.6" stroke-linecap="round"><circle cx="8" cy="6" r="3"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6"/></svg>
            </div>
            <div class="stat-val" style="color:var(--gold)">${s.totalUsers}</div>
            <div class="stat-label">Пользователей</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon" style="background:var(--green-dim)">
              <svg viewBox="0 0 16 16" fill="none" stroke="var(--green)" stroke-width="1.6" stroke-linecap="round"><path d="M8 2v12M2 8h12"/></svg>
            </div>
            <div class="stat-val" style="color:var(--green)">${s.newToday}</div>
            <div class="stat-label">Новых сегодня</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon" style="background:var(--blue-dim)">
              <svg viewBox="0 0 16 16" fill="none" stroke="var(--blue)" stroke-width="1.6" stroke-linecap="round"><rect x="2" y="3" width="12" height="10" rx="2"/><path d="M5 7h6M5 10h4"/></svg>
            </div>
            <div class="stat-val" style="color:var(--blue)">${s.activeUsers}</div>
            <div class="stat-label">Активных / мес</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon" style="background:rgba(240,165,0,0.12)">
              <svg viewBox="0 0 16 16" fill="none" stroke="#F0A500" stroke-width="1.6" stroke-linecap="round"><circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 2"/></svg>
            </div>
            <div class="stat-val" style="color:#F0A500">${s.pending}</div>
            <div class="stat-label">Ожидают</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon" style="background:var(--gold-dim)">
              <svg viewBox="0 0 16 16" fill="none" stroke="var(--gold)" stroke-width="1.6" stroke-linecap="round"><path d="M2 10h12M5 6h6M8 2v12"/></svg>
            </div>
            <div class="stat-val" style="color:var(--gold); font-size:16px">${Math.round(s.totalRub).toLocaleString('ru-RU')}</div>
            <div class="stat-label">Оборот ₽ (всего)</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon" style="background:var(--green-dim)">
              <svg viewBox="0 0 16 16" fill="none" stroke="var(--green)" stroke-width="1.6" stroke-linecap="round"><circle cx="8" cy="8" r="6"/><path d="M8 5v6M6 7h4"/></svg>
            </div>
            <div class="stat-val" style="color:var(--green); font-size:16px">${s.totalUsdt.toFixed(2)}</div>
            <div class="stat-label">Оборот USDT (всего)</div>
          </div>
          <div class="stat-card stat-full">
            <div class="stat-icon" style="background:var(--blue-dim)">
              <svg viewBox="0 0 16 16" fill="none" stroke="var(--blue)" stroke-width="1.6" stroke-linecap="round"><path d="M2 12l4-4 3 3 5-6"/></svg>
            </div>
            <div class="stat-val" style="color:var(--blue)">${s.monthOrders}</div>
            <div class="stat-label">Заявок за последние 30 дней</div>
          </div>
        </div>`;
    } catch(e) {
      el.innerHTML = `<div class="empty-state"><p style="color:var(--red)">${e.message}</p></div>`;
    }
  }

  // ── Users ───────────────────────────────────────────────────────────────────
  async function loadUsers() {
    const el = document.getElementById('users-content');
    el.innerHTML = '<div class="loading"><div class="spinner"></div>Загрузка...</div>';
    try {
      const users = await api('GET', '/api/admin/users');
      if (!users.length) {
        el.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-8 8-8s8 4 8 8"/></svg><p>Пользователей нет</p></div>';
        return;
      }
      el.innerHTML = users.map((u, i) => {
        const initials = ((u.first_name||'')[0]||'') + ((u.last_name||'')[0]||'');
        const name = [u.first_name, u.last_name].filter(Boolean).join(' ') || 'Без имени';
        const tag = u.username ? `@${u.username}` : `#${u.tg_id}`;
        return `<div class="user-item" id="user-${u.tg_id}">
          <div class="user-rank ${i===0?'gold':''}">${i+1}</div>
          <div class="user-avatar">${initials.toUpperCase()||'?'}</div>
          <div class="user-info">
            <div class="user-name">${name}</div>
            <div class="user-tag">${tag}</div>
            <div style="margin-top:4px"><span class="balance-chip">${u.balance.toFixed(2)} USDT</span></div>
            <button class="block-btn ${u.blocked?'unblock':'block'}" onclick="toggleBlock(${u.tg_id}, ${u.blocked?0:1})">
              ${u.blocked ? '✅ Разблокировать' : '🚫 Заблокировать'}
            </button>
          </div>
          <div class="user-stats">
            <div class="user-orders">${u.order_count}</div>
            <div class="user-vol">сделок</div>
            <div class="user-vol" style="margin-top:4px">${u.volume_usdt.toFixed(1)} USDT</div>
          </div>
        </div>`;
      }).join('');
    } catch(e) {
      el.innerHTML = `<div class="empty-state"><p style="color:var(--red)">${e.message}</p></div>`;
    }
  }

  async function toggleBlock(tgId, blocked) {
    try {
      await api('POST', '/api/admin/block', { tg_id: tgId, blocked: !!blocked });
      showToast(blocked ? '🚫 Пользователь заблокирован' : '✅ Разблокирован', blocked ? 'error' : 'success');
      loadUsers();
    } catch(e) { showToast(e.message, 'error'); }
  }

  // ── Broadcast ───────────────────────────────────────────────────────────────
  function updatePreview() {
    const text = document.getElementById('broadcast-text').value;
    const preview = document.getElementById('broadcast-preview');
    const count = document.getElementById('char-count');
    count.textContent = text.length;
    if (!text.trim()) {
      preview.textContent = 'Начните вводить сообщение...';
      preview.className = 'broadcast-preview empty';
    } else {
      preview.textContent = text;
      preview.className = 'broadcast-preview';
    }
  }

  function insertMd(before, after) {
    const ta = document.getElementById('broadcast-text');
    const start = ta.selectionStart, end = ta.selectionEnd;
    const selected = ta.value.substring(start, end);
    const replacement = before + (selected || 'текст') + after;
    ta.value = ta.value.substring(0, start) + replacement + ta.value.substring(end);
    ta.focus();
    ta.setSelectionRange(start + before.length, start + before.length + (selected || 'текст').length);
    updatePreview();
  }

  async function sendBroadcast() {
    const message = document.getElementById('broadcast-text').value.trim();
    if (!message) { showToast('Введите сообщение', 'error'); return; }
    const btn = document.getElementById('send-btn');
    const result = document.getElementById('broadcast-result');
    btn.disabled = true;
    btn.textContent = 'Отправка...';
    result.style.display = 'none';
    try {
      const data = await api('POST', '/api/admin/broadcast', { message });
      result.textContent = `✅ Отправлено: ${data.sent} · Ошибок: ${data.failed}`;
      result.className = 'broadcast-result success';
      result.style.display = 'block';
      document.getElementById('broadcast-text').value = '';
      updatePreview();
    } catch(e) {
      result.textContent = '❌ ' + e.message;
      result.className = 'broadcast-result error';
      result.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2L2 7l5 2m7-7L9 14l-2-5m7-7L7 9"/></svg> Отправить всем`;
    }
  }

  // ── Toast ───────────────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg, type='info') {
    const t = document.getElementById('toast');
    document.getElementById('toast-msg').textContent = msg;
    t.className = 'toast ' + type + ' show';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
  }

  // Init
  loadStats();
</script>
</body>
</html>
